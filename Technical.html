<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Technical Skills - Ultra Max</title>
  <!-- Google Fonts & FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* Base Resets */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050810;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      overflow-x: hidden;
    }
    
    #tech-skills {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 100px 20px 140px;
      min-height: 100vh;
    }

    .section-title {
      font-family: 'Orbitron', monospace;
      font-size: 3rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 6px;
      text-align: center;
      margin-bottom: 60px;
      position: relative;
      color: #fff;
      text-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }
    .section-title::after {
      content: '';
      display: block;
      width: 100px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ffff, transparent);
      margin: 15px auto 0;
      box-shadow: 0 0 15px #00ffff;
    }

    /* Common HUD Node Styles */
    .hud-node {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      transform-style: preserve-3d;
      perspective: 800px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: default;
    }
    .hud-node:hover {
      transform: translateY(-10px) scale(1.05) !important;
      z-index: 20;
    }

    .hud-ring-outer {
      position: absolute;
      inset: -10%;
      border-radius: 50%;
      border: 2px solid transparent;
      border-top-color: var(--theme-color);
      border-bottom-color: var(--theme-color);
      animation: spinSlow 12s linear infinite;
      transition: box-shadow 0.3s ease, border-color 0.3s ease, opacity 0.3s ease;
      opacity: var(--ring-opacity, 0.6);
      z-index: 1;
    }
    .hud-node:hover .hud-ring-outer {
      animation-duration: 4s;
      box-shadow: 0 0 25px var(--theme-color), inset 0 0 15px rgba(0,0,0,0.5);
      opacity: 1;
    }
    
    .hud-ring-dashed {
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.2);
      animation: spinReverse 18s linear infinite;
      z-index: 1;
      opacity: 0.5;
    }

    .hud-progress-svg {
      position: absolute;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
      overflow: visible;
      z-index: 2;
    }
    .hud-progress-bg {
      fill: rgba(8, 12, 20, 0.85);
      stroke: rgba(255,255,255,0.05);
      stroke-width: 6;
      backdrop-filter: blur(5px);
    }
    .hud-progress-fill {
      fill: transparent;
      stroke: var(--theme-color);
      stroke-width: 8;
      stroke-linecap: round;
      stroke-dasharray: 565.48; /* Reference circumference */
      stroke-dashoffset: 565.48;
      filter: drop-shadow(0 0 var(--glow-intensity, 10px) var(--theme-color));
      transition: filter 0.3s ease;
    }
    .hud-node:hover .hud-progress-fill {
      filter: drop-shadow(0 0 calc(var(--glow-intensity, 10px) * 2) var(--theme-color));
    }

    .hud-center {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      z-index: 3;
      transition: transform 0.4s ease;
    }
    .hud-node:hover .hud-center {
      transform: scale(1.12);
    }

    .hud-icon {
      font-size: var(--icon-size, 1.8rem);
      color: var(--theme-color);
      text-shadow: 0 0 15px var(--theme-color);
    }
    .hud-number {
      font-family: 'Orbitron', monospace;
      font-size: var(--num-size, 1.2rem);
      font-weight: 800;
      color: #fff;
    }

    .hud-label-container {
      position: absolute;
      bottom: -35px;
      white-space: nowrap;
      z-index: 4;
      display: flex;
      justify-content: center;
      width: 100%;
    }
    .hud-label-text {
      font-family: 'Exo 2', sans-serif;
      font-size: var(--label-size, 0.8rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-transform: uppercase;
      letter-spacing: 2px;
      background: rgba(10,15,24,0.9);
      padding: 5px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      transition: all 0.3s ease;
    }
    .hud-node:hover .hud-label-text {
      background: var(--theme-color);
      color: #000;
      border-color: transparent;
      box-shadow: 0 0 20px var(--theme-color);
    }

    /* NODE SIZE TOKENS */
    .node-sm { 
      width: 130px; height: 130px; 
      --icon-size: 1.5rem; --num-size: 1.1rem; --label-size: 0.75rem; 
      --glow-intensity: 6px; --ring-opacity: 0.3;
    }
    .node-md { 
      width: 170px; height: 170px; 
      --icon-size: 2.2rem; --num-size: 1.5rem; --label-size: 0.85rem; 
      --glow-intensity: 12px; --ring-opacity: 0.7;
    }
    .node-lg { 
      width: 250px; height: 250px; 
      --icon-size: 3.5rem; --num-size: 2.2rem; --label-size: 1.1rem; 
      --glow-intensity: 25px; --ring-opacity: 1;
    }

    /* LAYOUT WRAPPERS */
    .skills-wrapper {
      width: 100%;
      max-width: 1100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7rem;
    }

    /* 1. Languages (Top Section - Low Priority) */
    .lang-section {
      display: flex;
      justify-content: center;
      gap: 5rem;
      width: 100%;
    }

    /* 2. Game Development (Center - Hero Section) */
    .game-dev-section {
      position: relative;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
      margin: 2rem 0;
    }
    
    .node-unity {
      position: absolute;
      z-index: 10;
      animation: pulseGlow 4s ease-in-out infinite alternate;
    }
    
    @keyframes pulseGlow {
      0% { filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.3)); }
      100% { filter: drop-shadow(0 0 40px rgba(0, 255, 255, 0.7)); }
    }

    .satellite-node {
      position: absolute;
      z-index: 5;
    }
    /* Perfect symmetrical positioning around Unity */
    .sat-tl { top: -30px; left: 12%; }
    .sat-tr { top: -30px; right: 12%; }
    .sat-b  { bottom: -60px; left: 0; right: 0; margin: auto; }

    /* 3. Tools (Bottom Section - Minimal) */
    .tools-section {
      display: flex;
      justify-content: center;
      gap: 6rem;
      width: 100%;
    }

    .learning-tag {
      font-size: 0.55rem;
      background: rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      padding: 3px 8px;
      border-radius: 10px;
      margin-top: 4px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Floating Animations */
    .floating { animation: float 4s ease-in-out infinite; }
    .floating-delay { animation: float 4.5s ease-in-out infinite 1s; }
    .floating-delay-2 { animation: float 5s ease-in-out infinite 2s; }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    @keyframes spinSlow { 100% { transform: rotate(360deg); } }
    @keyframes spinReverse { 100% { transform: rotate(-360deg); } }

    /* Responsive */
    @media (max-width: 900px) {
      .game-dev-section {
        flex-direction: column;
        gap: 5rem;
        min-height: auto;
      }
      .node-unity, .satellite-node {
        position: relative;
        top: auto; left: auto; right: auto; bottom: auto;
      }
      .lang-section, .tools-section {
        flex-wrap: wrap;
        gap: 4rem;
      }
    }
  </style>
</head>
<body>

  <section id="tech-skills">
    <h2 class="section-title">Technical Skills</h2>
    
    <div class="skills-wrapper">
      
      <!-- 1. Languages (Top Section) -->
      <div class="lang-section">
        <div class="hud-node node-sm reveal-item" style="--theme-color: #d946ef;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="49"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-hashtag hud-icon floating"></i>
            <span class="hud-number" data-percent="49">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">C#</h4></div>
        </div>

        <div class="hud-node node-sm reveal-item" style="--theme-color: #3b82f6;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="68"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-c hud-icon floating-delay"></i>
            <span class="hud-number" data-percent="68">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">C</h4></div>
        </div>

        <div class="hud-node node-sm reveal-item" style="--theme-color: #10b981;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="72"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-brands fa-python hud-icon floating-delay-2"></i>
            <span class="hud-number" data-percent="72">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">Python</h4></div>
        </div>
      </div>

      <!-- 2. Game Development (Center - Hero Section) -->
      <div class="game-dev-section">
        
        <!-- Satellite: Game Design (Top Left) -->
        <div class="hud-node node-md satellite-node sat-tl reveal-sat" style="--theme-color: #ec4899;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="85"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-bezier-curve hud-icon floating-delay"></i>
            <span class="hud-number" data-percent="85">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">Game Design</h4></div>
        </div>

        <!-- Satellite: Story Writing (Top Right) - Slightly more prominent -->
        <div class="hud-node node-md satellite-node sat-tr reveal-sat" style="--theme-color: #fbbf24; --glow-intensity: 18px;">
          <div class="hud-ring-outer" style="border-width: 3px;"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="95"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-book-journal-whills hud-icon floating-delay-2"></i>
            <span class="hud-number" data-percent="95">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text" style="color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.5);">Story Writing</h4></div>
        </div>

        <!-- Center Hero: Unity Engine -->
        <div class="hud-node node-lg node-unity reveal-unity" style="--theme-color: #00ffff;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="90"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-brands fa-unity hud-icon floating"></i>
            <span class="hud-number" data-percent="90">0%</span>
          </div>
          <div class="hud-label-container" style="bottom: -50px;"><h4 class="hud-label-text" style="font-size: 1.1rem; padding: 8px 20px;">Unity Engine</h4></div>
        </div>

        <!-- Satellite: Game UI/UX (Bottom) -->
        <div class="hud-node node-md satellite-node sat-b reveal-sat" style="--theme-color: #f97316;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="55"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-mobile-screen-button hud-icon floating"></i>
            <span class="hud-number" data-percent="55">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">Game UI/UX</h4></div>
        </div>

      </div>

      <!-- 3. Tools (Bottom Section) -->
      <div class="tools-section">
        <div class="hud-node node-sm reveal-item" style="--theme-color: #0284c7;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="68"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-code hud-icon floating"></i>
            <span class="hud-number" data-percent="68">0%</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text">VS Code</h4></div>
        </div>

        <!-- Blender: Learning state -->
        <div class="hud-node node-sm reveal-item" style="--theme-color: #a8a29e; --glow-intensity: 3px; transform-origin: center;">
          <div class="hud-ring-outer"></div>
          <div class="hud-ring-dashed"></div>
          <svg class="hud-progress-svg" viewBox="0 0 200 200">
            <circle class="hud-progress-bg" cx="100" cy="100" r="90"></circle>
            <circle class="hud-progress-fill" cx="100" cy="100" r="90" data-percent="5"></circle>
          </svg>
          <div class="hud-center">
            <i class="fa-solid fa-cube hud-icon floating-delay"></i>
            <span class="hud-number" data-percent="5">0%</span>
            <span class="learning-tag">LEARNING</span>
          </div>
          <div class="hud-label-container"><h4 class="hud-label-text" style="color: #a8a29e;">Blender</h4></div>
        </div>
      </div>

    </div>
  </section>

  <!-- GSAP Animation Scripts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    // Initial setup for GSAP
    gsap.set(".reveal-item", { y: 60, opacity: 0 });
    gsap.set(".reveal-sat", { y: 50, opacity: 0 });
    gsap.set(".reveal-unity", { scale: 0.8, opacity: 0, filter: "blur(10px)" });

    const tl = gsap.timeline({
      scrollTrigger: {
        trigger: "#tech-skills",
        start: "top 75%",
      }
    });

    // 1. Reveal Unity (Hero) first
    tl.to(".reveal-unity", {
      scale: 1, 
      opacity: 1, 
      filter: "blur(0px)",
      duration: 1.2, 
      ease: "back.out(1.5)"
    }, 0);

    // 2. Reveal Satellites symmetrically
    tl.to(".reveal-sat", {
      y: 0, 
      opacity: 1, 
      duration: 1, 
      stagger: 0.2, 
      ease: "power3.out"
    }, 0.5);

    // 3. Reveal Languages (Top)
    tl.to(".lang-section .reveal-item", {
      y: 0, 
      opacity: 1, 
      duration: 0.8, 
      stagger: 0.15, 
      ease: "power2.out"
    }, 1.0);

    // 4. Reveal Tools (Bottom)
    tl.to(".tools-section .reveal-item", {
      y: 0, 
      opacity: 1, 
      duration: 0.8, 
      stagger: 0.15, 
      ease: "power2.out"
    }, 1.3);

    // Progress Rings Fill & Counter
    const rings = document.querySelectorAll('.hud-progress-fill');
    rings.forEach((ring) => {
      let percent = parseFloat(ring.getAttribute('data-percent'));
      let offset = 565.48 - (565.48 * percent) / 100;
      tl.to(ring, { strokeDashoffset: offset, duration: 2.5, ease: 'expo.out' }, 1.0);
    });

    const texts = document.querySelectorAll('.hud-number');
    texts.forEach((text) => {
      let percent = parseInt(text.getAttribute('data-percent'));
      let counter = { val: 0 };
      tl.to(counter, {
        val: percent,
        duration: 2.5,
        ease: 'expo.out',
        onUpdate: function() {
          text.textContent = Math.round(counter.val) + '%';
        }
      }, 1.0);
    });
  </script>
</body>
</html>
